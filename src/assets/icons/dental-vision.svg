<!-- dental-vision.svg -->
<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dvGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9FD8FF"/>
      <stop offset="100%" stop-color="#5BB6E6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#dvGrad)" opacity="0.15"/>

  <!-- Tooth -->
  <path d="M45 40
           C40 30, 30 30, 30 45
           C30 60, 40 70, 45 80
           C48 85, 52 85, 55 75
           C58 85, 62 85, 65 80
           C70 70, 80 60, 80 45
           C80 30, 70 30, 65 40
           C60 35, 50 35, 45 40Z"
        fill="#EAF6FF"/>

  <!-- Eye -->
  <ellipse cx="60" cy="58" rx="18" ry="10" fill="#1C6FA5"/>
  <circle cx="60" cy="58" r="5" fill="#FFFFFF"/>
</svg>