<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="bg" cx="35%" cy="28%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="0.55" stop-color="#dcebff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#b9d4ff" stop-opacity="0.92"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0b2a52" flood-opacity="0.16"/>
    </filter>
    <radialGradient id="orb" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#bfe6ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#6fc2ee" stop-opacity="0.78"/>
    </radialGradient>
    <linearGradient id="eye" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2aa9ff"/>
      <stop offset="1" stop-color="#0f4f7f"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <circle cx="60" cy="60" r="46" fill="url(#bg)"/>
  <g filter="url(#softShadow)">
    <circle cx="60" cy="60" r="38" fill="url(#orb)"/>
    <!-- Tooth -->
    <path d="M46 40c-5-9-17-8-17 6 0 17 11 26 16 35 3 5 8 4 11-6 2 11 8 11 11 6 5-9 16-18 16-35 0-14-12-15-17-6-6-6-14-6-20 0z"
          fill="#ffffff" opacity="0.94"/>
    <!-- Eye overlay -->
    <ellipse cx="78" cy="70" rx="17" ry="10" fill="url(#eye)" opacity="0.95"/>
    <circle cx="78" cy="70" r="4.5" fill="#fff"/>
    <path d="M68 70c4-5 10-8 18-8" stroke="#ffffff" stroke-opacity=".35" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M44 44c12-10 34-10 46 0" fill="none" stroke="url(#shine)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
